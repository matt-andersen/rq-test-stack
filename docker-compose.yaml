services:
  redis:
    image: redis:7-alpine
    container_name: rq-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  worker-default:
    build:
      context: ./
      dockerfile: ./worker/Dockerfile
    container_name: rq-worker-default
    environment:
      REDIS_URL: redis://redis:6379/0
      QUEUE_NAME: default
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker-slow:
    build:
      context: ./
      dockerfile: ./worker/Dockerfile
    container_name: rq-worker-slow
    environment:
      REDIS_URL: redis://redis:6379/0
      QUEUE_NAME: slow
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis-data: {}
